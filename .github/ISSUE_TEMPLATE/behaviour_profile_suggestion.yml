name: Behaviour Profile Suggestion
description: Propose improvements or additions to behaviour profiles
labels: [enhancement, profile]
body:
  - type: input
    id: profile
    attributes:
      label: Existing Profile (or New Profile Name)
      placeholder: e.g. Security Engineer
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Why should this profile behavior be changed?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected Impact
      description: How should prompt wording, questions, and constraints change?

