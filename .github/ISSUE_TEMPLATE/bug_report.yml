name: Bug Report
description: Report a reproducible defect in Prompt Whisperer
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide exact steps and input used.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: IDE version, plugin version, OS, JDK version.
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste logs or attach screenshots.

